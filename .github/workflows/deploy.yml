name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd chinook-backend
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd chinook-backend
          pytest tests/ -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd chinook-frontend
          npm install
      - name: Run tests
        run: |
          cd chinook-frontend
          npm test -- --watchAll=false

  deploy-backend:
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Backend EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/chinook-backend
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart chinook-backend

  deploy-frontend:
    needs: test-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Frontend EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/chinook-frontend
            git pull origin main
            npm install
            npm run build
            sudo systemctl restart chinook-frontend
